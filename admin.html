<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{background:#f5f5f5;padding:20px}
  .box{max-width:450px;background:white;margin:0 auto;padding:25px;border-radius:16px}
  h2{text-align:center;color:#d82c2c;margin-bottom:20px}
  input{width:100%;height:45px;padding:0 15px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
  .btn{width:100%;height:50px;background:#d82c2c;color:white;border:none;border-radius:8px;margin-top:10px;font-size:16px}
  .stats{background:#f0f8ff;padding:15px;border-radius:8px;margin:15px 0;line-height:1.8}
  .hide{display:none}
</style>
</head>
<body>
<div class="box" id="login">
  <h2>Admin Login</h2>
  <input type="password" id="pwd" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<div class="box hide" id="admin">
  <h2>Admin Panel</h2>
  <div class="stats" id="stats"></div>

  <input placeholder="Umbrella Stock" id="umbrella">
  <input placeholder="Nail Set Stock" id="nail">
  <input placeholder="Fan Stock" id="fan">

  <button class="btn" onclick="save()">Save Stock</button>
</div>

<script>
const PASSWORD = "66668888";
const KEY = "lucky_data";

function getData() {
  let data = localStorage.getItem(KEY);
  if (!data) return { umbrella:10, nail:50, fan:50, total:0, records:[] };
  return JSON.parse(data);
}
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function login() {
  if (document.getElementById("pwd").value === PASSWORD) {
    document.getElementById("login").classList.add("hide");
    document.getElementById("admin").classList.remove("hide");
    refresh();
  } else {
    alert("Wrong Password");
  }
}

function refresh() {
  let d = getData();
  document.getElementById("stats").innerText =
    `Total Drawn: ${d.total}\nUmbrella: ${d.umbrella}\nNail Set: ${d.nail}\nFan: ${d.fan}`;
  document.getElementById("umbrella").value = d.umbrella;
  document.getElementById("nail").value = d.nail;
  document.getElementById("fan").value = d.fan;
}

function save() {
  let d = getData();
  d.umbrella = parseInt(document.getElementById("umbrella").value) || 0;
  d.nail = parseInt(document.getElementById("nail").value) || 0;
  d.fan = parseInt(document.getElementById("fan").value) || 0;
  saveData(d);
  alert("Saved successfully!");
  refresh();
}

setInterval(refresh, 2000);
</script>
</body>
</html>
